name: Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_API_URL: http://13.207.17.117

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
          key: ${{ runner.os }}-android-build-cache-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-android-build-cache-

      - name: Write production env for Metro bundle
        run: echo "EXPO_PUBLIC_API_URL=http://13.207.17.117" > .env.production

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Audit production API endpoints
        run: node scripts/audit-api-endpoints.mjs

      - name: Audit deploy config
        run: node scripts/audit-deploy-config.mjs

      - name: Audit APK release (API, cleartext, assets)
        run: node scripts/audit-apk-release.mjs

      - name: Verify production API config
        run: node scripts/verify-production-api.mjs

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        env:
          EXPO_PUBLIC_API_URL: http://13.207.17.117
          GRADLE_OPTS: -Dorg.gradle.caching=true -Dorg.gradle.parallel=true
        run: ./gradlew assembleRelease --build-cache --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agri-clinic-field-app-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
